[package]
edition = "2021"
name = "engine_backend"
description = "A modern high-performance game engine backend written in Rust"
publish = false
version = "0.1.34"

[profile.dev.package."*"]
opt-level = 3

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true

[dependencies]
engine_subsystems = { workspace = true }
ui_gen_macros = { workspace = true }
pebble = { package = "PebbleVault", version = "0.7.0" }
serde = { workspace = true, features = ["derive"] }
uuid = { workspace = true, features = ["v4"] }
tokio = { workspace = true, features = ["full"] }
rapier3d.workspace = true
tracing = { workspace = true }
thiserror = { workspace = true }
dashmap = { workspace = true }

# Reflection system
pulsar_reflection = { workspace = true, features = ["ui", "prims-glam", "prims-helio"] }
pulsar_events.workspace = true
engine_state.workspace = true

# Shared scene loading — canonical implementation used by both engine and game
pulsar_scene.workspace = true
pulsar_rendering.workspace = true
engine_fs.workspace = true

# Profiling - instrumentation-based
profiling = { workspace = true }

# UI dependencies needed for services
gpui-ce.workspace = true
ui.workspace = true
pulsar_lsp.workspace = true
lsp-types.workspace = true
ropey.workspace = true
flume = { workspace = true }

# Helio rendering (wgpu-based)
helio.workspace = true
helio-asset-compat = { workspace = true }
pulsar_helio.workspace = true
glam.workspace = true
bytemuck = "1.14"

wgpu = "30"
crossbeam-channel = { workspace = true }
futures = { workspace = true }
parking_lot = { workspace = true }
anyhow = { workspace = true }
# horizon = { git = "https://github.com/Far-Beyond-Dev/Horizon", rev = "b11774f548d50e183b9a452369cda6877fc0abe4" }
serde_json = { workspace = true }
reqwest = { version = "0.13", default-features = false, features = ["blocking", "json", "rustls-no-provider"] }

# Networking dependencies
async-tungstenite = { version = "0.34", features = ["tokio-runtime"] }
git2 = { workspace = true }
sha2 = { workspace = true }
walkdir = { workspace = true }

[target.'cfg(windows)'.dependencies]
windows = { workspace = true }
winapi = { workspace = true, features = ["winuser"] }

[target.'cfg(target_os = "linux")'.dependencies]
ash = "0.38"
