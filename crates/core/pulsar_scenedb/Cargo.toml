[package]
name = "pulsar_scenedb"
version = "0.1.0"
edition = "2021"
description = "SceneDB 2.0 ŌĆö engine-wide spatial database (Layer 1 storage core)"

[features]
default = []
gpu = ["dep:wgpu"]

[dependencies]
pulsar_core       = { workspace = true }
# CONTRACTS.md C0 (audit A, V1): SceneDB never depends on Helio.
# `pulsar_reflection`'s `default` feature list used to include `prims-helio`
# -> `dep:helio` (Far-Beyond-Pulsar/Helio git crate). SceneDB only uses the
# core reflection registry/type-info surface (`RuntimeTypeInfo`,
# `RUNTIME_TYPE_REGISTRY`, `EngineClass`, `REGISTRY` ŌĆö `src/token.rs`,
# `src/component_store.rs`), none of which are gated behind any `prims-*`
# feature at all (see `pulsar_reflection/src/lib.rs`: those symbols are
# unconditional; only `src/prims/mod.rs`'s primitive-type *registrations* are
# feature-gated). The edge is cut at the source: `prims-helio` is no longer
# in `pulsar_reflection`'s `default` list (see that crate's Cargo.toml) ŌĆö NOT
# by overriding `default-features` on this edge. A per-edge
# `default-features = false` override here is both ineffective (Cargo's
# resolver unifies a shared dependency's activated features by UNION across
# every workspace member that requests it ŌĆö one consumer requesting fewer
# features can never subtract what another consumer's `workspace = true`
# already turned on) and, separately, rejected by Cargo itself when the
# `[workspace.dependencies]` entry doesn't declare `default-features`
# (warns: "this could become a hard error"). Plain inheritance is correct
# here. Proof: `cargo tree -p pulsar_scenedb --no-default-features -e normal
# | grep -i helio` (and with `--features gpu`) must output nothing ŌĆö
# enforced in CI (audit A, G1).
pulsar_reflection = { workspace = true }
serde_json        = { workspace = true }
ahash             = "0.8"
profiling         = { workspace = true }
tracing           = { workspace = true }
wgpu              = { workspace = true, optional = true }

[lints]
workspace = true

[dev-dependencies]
rand = "0.8"
criterion = { version = "=0.8.2" }
pollster = "1.0"
# rev must stay in lockstep with the workspace `wgpu` git dep in the root
# Cargo.toml (a path dep can't work: crates/graphics/wgpu is its own workspace).
naga = { git = "https://github.com/Far-Beyond-Pulsar/wgpu", rev = "fce5b80e8017304449124b12637ec324417e40c8", features = ["wgsl-in"] }

[[bench]]
name = "ecs_bench"
harness = false

[[bench]]
name = "hotpath_profiler"
harness = false

[[bench]]
name = "ecs_detailed_bench"
harness = false

[[bench]]
name = "scenedb_bench"
harness = false

[[test]]
name = "gpu_store"
required-features = ["gpu"]

[[test]]
name = "gpu_layout"
required-features = ["gpu"]

[[test]]
name = "gpu_assets"
required-features = ["gpu"]

[[test]]
name = "gpu_harvest"
required-features = ["gpu"]
