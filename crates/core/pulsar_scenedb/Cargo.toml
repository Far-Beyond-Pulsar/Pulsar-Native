[package]
name = "pulsar_scenedb"
version = "0.1.0"
edition = "2021"
description = "SceneDB 2.0 — engine-wide spatial database (Layer 1 storage core)"

[features]
default = []
gpu = ["dep:wgpu"]

[dependencies]
pulsar_core       = { workspace = true }
pulsar_reflection = { workspace = true }
serde_json        = { workspace = true }
ahash             = "0.8"
profiling         = { workspace = true }
tracing           = { workspace = true }
wgpu              = { workspace = true, optional = true }

[lints]
workspace = true

[dev-dependencies]
rand = "0.8"
criterion = { version = "=0.8.2" }
pollster = "1.0"
naga = { git = "https://github.com/Far-Beyond-Pulsar/wgpu", rev = "fce5b80e8017304449124b12637ec324417e40c8", features = ["wgsl-in"] }

[[bench]]
name = "ecs_bench"
harness = false

[[bench]]
name = "hotpath_profiler"
harness = false

[[bench]]
name = "ecs_detailed_bench"
harness = false

[[bench]]
name = "scenedb_bench"
harness = false

[[test]]
name = "gpu_store"
required-features = ["gpu"]

[[test]]
name = "gpu_layout"
required-features = ["gpu"]
