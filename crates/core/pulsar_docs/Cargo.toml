[package]
name = "pulsar_docs"
version = "0.1.0"
edition = "2024"

# Don't document this crate to prevent recursive build issues
[package.metadata.docs.rs]
skip = true

[lib]
# Skip this crate when running cargo doc
doc = false

[dependencies]
rust-embed = { workspace = true, features = ["include-exclude"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
syn = { workspace = true, features = ["full", "parsing", "extra-traits", "visit"] }
quote = { workspace = true }
walkdir = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
syn = { workspace = true, features = ["full", "parsing", "extra-traits", "visit"] }
quote = { workspace = true }
prettyplease = "0.3"
walkdir = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
toml = { workspace = true }

[lints]
workspace = true
