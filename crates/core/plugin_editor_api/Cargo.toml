[package]
name = "plugin_editor_api"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
schemars = { workspace = true }
tracing = { workspace = true }
gpui-ce.workspace = true
window_manager = { workspace = true }
ui_types_common = { workspace = true }

# UI dependencies (for Panel trait integration)
ui.workspace = true

# Subsystem framework (used by EditorPluginSubsystems)
engine_subsystems = { workspace = true }

# Reflection system (for EngineClass — plugin components use full reflection)
pulsar_reflection = { workspace = true, features = ["ui"] }
[build-dependencies]
tracing = { workspace = true }

[dev-dependencies]
tracing = { workspace = true }
[lib]
crate-type = ["lib", "cdylib"]

[lints]
workspace = true
