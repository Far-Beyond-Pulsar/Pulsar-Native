[package]
name = "pulsar-relay"
version = "0.1.0"
edition = "2021"
description = "Pulsar Relay - P2P rendezvous, relay, and signaling server"

[[bin]]
name = "pulsar-relay"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { workspace = true, features = ["full", "tracing"] }
futures-util = "0.3"

# Web server
axum = { workspace = true, features = ["ws", "macros", "http2"] }
tower-http = { workspace = true, features = ["trace", "cors", "timeout"] }

# QUIC transport
quinn = { workspace = true }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }
rustls-pemfile = "2.1"
rcgen = "0.14"
webpki-roots = "0.26"
# Commented out post-quantum until aws-lc-sys Windows support improves
# rustls-post-quantum = "0.2"

# Networking
socket2 = "0.6"


ed25519-dalek = { version = "3.0", features = ["rand_core"] }
rand = { workspace = true }

# JWT
jsonwebtoken = "10.0"

# Async trait support
async-trait = "0.1"

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
toml = { workspace = true }
bincode = { version = "2.0.1", features = ["serde"] }

# Logging & Telemetry
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "json", "fmt", "ansi"] }
colored = "3.0"
opentelemetry = "0.32"
opentelemetry_sdk = { version = "0.32", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.32", features = ["grpc-tonic"] }

# Metrics
prometheus = "0.14"

# Database
sqlx = { version = "0.9", features = ["postgres", "runtime-tokio", "tls-rustls", "macros", "uuid", "chrono"] }

# No AWS - using local storage only

# Config & CLI
clap = { workspace = true, features = ["derive", "env"] }
config = "0.15"
anyhow = { workspace = true }

# Pulsar multiplayer core
pulsar-multiplayer-core = { workspace = true }

# HTTP client (GitHub API verification)
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls-no-provider"] }

# Utilities
uuid = { workspace = true, features = ["v4", "serde"] }
bytes = "1.7"
chrono = { workspace = true, features = ["serde"] }
once_cell = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }
base64 = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[build-dependencies]
prost-build = "0.14"

[dev-dependencies]
criterion = { version = "=0.8.2", features = ["async_tokio"] }
proptest = "=1.11.0"
mockall = "=0.15.0"
tempfile = { workspace = true }
reqwest = { version = "=0.13.4", features = ["json"] }

# [[bench]]
# name = "relay_throughput"
# harness = false

# [[bench]]
# name = "crdt_convergence"
# harness = false

[lints]
workspace = true
