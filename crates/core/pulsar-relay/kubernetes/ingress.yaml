apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulsar-relay
  labels:
    app: pulsar-relay
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/websocket-services: "pulsar-relay-http"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - relay.pulsarnative.com
    secretName: pulsar-relay-tls
  rules:
  - host: relay.pulsarnative.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pulsar-relay-http
            port:
              number: 80
