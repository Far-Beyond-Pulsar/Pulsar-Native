[package]
name = "pulsar_std"
version = "0.1.0"
edition = "2021"

[lib]
# rlib for normal dependency use; cdylib when pulsar_std_bundle's build.rs compiles
# it as a native shared library to embed in the executor bundle.
crate-type = ["rlib", "cdylib"]

[features]
default = ["native"]
# native: full stdlib including threading, Lua scripting, and the linkme registry
native = ["dep:rlua", "dep:linkme"]


[dependencies]
pulsar_macros = { workspace = true }
pulsar_reflection = { workspace = true }
engine_fs = { path = "../engine_fs", default-features = false }
linkme         = { workspace = true, optional = true }
tracing        = { workspace = true }
rand           = { workspace = true, features = [] }

# rlua is native-only (links to liblua, uses pthreads)
rlua = { version = "0.20", optional = true }

[dev-dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
pulsar_reflection_derive = { workspace = true }

[lints]
workspace = true
