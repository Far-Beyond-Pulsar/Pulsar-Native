[package]
name = "ui_common"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# UI framework
gpui-ce.workspace = true
ui.workspace = true
window_manager.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
anyhow.workspace = true
rust-i18n.workspace = true
tracing.workspace = true
parking_lot = { workspace = true }
image.workspace = true
smallvec.workspace = true
smol = { workspace = true }
engine_state.workspace = true
pulsar_auth.workspace = true
engine_fs = { workspace = true, features = ["editor"] }
plugin_editor_api.workspace = true
# M3-alpha Task 2 (audit follow-up): `prims-gpui` is required here —
# `property_editor_registry.rs` iterates `inventory::iter::<UiPropertyEditorHint>`
# expecting GPUI editor registrations, and `reflected_properties_panel.rs`
# constructs `PropertyEditorArgs` with its GPUI-typed `on_bool_toggle`/
# `on_enum_select` fields. `gpui-ce`/`ui` are already unconditional deps of
# this crate above.
pulsar_reflection = { workspace = true, features = ["prims-gpui"] }
reqwest = { version = "0.13", default-features = false, features = ["blocking", "charset", "http2", "rustls-no-provider", "system-proxy"] }

[lints]
workspace = true
