[package]
name = "ui_entry"
version = "0.1.0"
edition = "2021"
publish = false
description = "Modular project-entry screen with OOBE, project management, cloud, plugins, and auth"

[dependencies]
rustup.workspace = true
gpui-ce.workspace = true
ui.workspace = true
ui_common.workspace = true
engine_state.workspace = true
engine_backend.workspace = true
window_manager.workspace = true
engine_fs.workspace = true
pulsar_auth.workspace = true
ui_git_manager.workspace = true
ui_friends.workspace = true
friends_engine.workspace = true
ui_loading_screen.workspace = true
git2 = { workspace = true }
directories = { workspace = true }
rfd = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
toml = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
parking_lot = { workspace = true }
open = { workspace = true }
reqwest = { version = "0.13", default-features = false, features = ["blocking", "charset", "http2", "json", "rustls-no-provider", "system-proxy"] }
tracing.workspace = true
image.workspace = true
smallvec.workspace = true
uuid = { workspace = true }
which = "8.0"

[target.'cfg(windows)'.dependencies]
runas = "1.2"

[lints]
workspace = true
