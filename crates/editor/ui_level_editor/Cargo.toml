[package]
name = "ui_level_editor"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# UI framework
gpui-ce.workspace = true
ui.workspace = true

# UI crates
ui_common.workspace = true
plugin_manager = { workspace = true }
ui_types_common.workspace = true
window_manager.workspace = true
plugin_editor_api.workspace = true
anyhow.workspace = true
tool_registry = { workspace = true }

# Engine
engine_state.workspace = true
engine_backend.workspace = true
# M3-alpha Task 2 (audit follow-up): `prims-gpui` is required here —
# `level_editor/ui/properties/object_type_fields/property_renderer.rs`
# constructs `pulsar_reflection::PropertyEditorArgs`'s GPUI-typed
# `on_bool_toggle`/`on_enum_select` fields directly. `gpui-ce`/`ui` are
# already unconditional deps of this crate above.
pulsar_reflection = { workspace = true, features = ["prims-gpui"] }
engine_class_derive = { workspace = true }
pulsar_rendering.workspace = true
pulsar_physics.workspace = true
engine_fs.workspace = true
profiling.workspace = true

# Helio renderer and asset loading
helio-asset-compat = { workspace = true }
glam.workspace = true

# Standard dependencies
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
rfd = { workspace = true }
parking_lot = { workspace = true }
tracing.workspace = true
chrono = { workspace = true, features = ["serde"] }
schemars = { workspace = true }
device_query = "4.0.1"
raw-window-handle = "0.6"
rust-i18n.workspace = true
wgpu.workspace = true
smol = { workspace = true }
image.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
core-graphics2 = "0.6"
core-foundation-sys = { workspace = true }
objc2 = "0.6"
objc2-app-kit = "0.3"
objc2-foundation = "0.3"  # separate crate for Foundation types

[target.'cfg(windows)'.dependencies]
winapi = { workspace = true, features = ["winuser", "shellapi"] }

[lints]
workspace = true
