[package]
name = "pulsar_scenedb"
version = "0.1.0"
edition = "2021"
description = "SceneDB 2.0 — engine-wide spatial database (Layer 1 storage core)"

[dependencies]
pulsar_core       = { workspace = true }
pulsar_reflection = { workspace = true }
serde_json        = { workspace = true }
ahash             = "0.8"
profiling         = { workspace = true }
tracing           = { workspace = true }

[lints]
workspace = true

[dev-dependencies]
rand = "0.8"
criterion = { version = "=0.8.2" }

[[bench]]
name = "ecs_bench"
harness = false

[[bench]]
name = "hotpath_profiler"
harness = false

[[bench]]
name = "ecs_detailed_bench"
harness = false
