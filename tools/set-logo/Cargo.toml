[package]
name = "set-logo"
version = "0.1.0"
edition = "2021"

[workspace]
# This is a standalone tool, not part of the main workspace

[[bin]]
name = "set-logo"
path = "src/main.rs"

[dependencies]
image = { workspace = true }
ico = "0.5"
icns = "0.4"
clap = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
