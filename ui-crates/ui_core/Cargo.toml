[package]
name = "ui_core"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# UI framework
gpui-ce.workspace = true
ui.workspace = true

# UI crates (all of them!)
ui_common.workspace = true
ui_types_common.workspace = true
ui_level_editor.workspace = true
ui_entry.workspace = true
ui_multiplayer.workspace = true
ui_problems.workspace = true
ui_flamegraph.workspace = true
ui_type_debugger.workspace = true
ui_file_manager.workspace = true
ui_plugin_manager.workspace = true
ui_log_viewer.workspace = true
ui_settings.workspace = true
ui_git_manager = { path = "../ui_git_manager" }
ui_about.workspace = true
ui_documentation.workspace = true


# Engine
engine_state.workspace = true
engine_backend.workspace = true
window_manager.workspace = true

# Plugin system
plugin_manager = { path = "../../crates/plugin_manager" }
plugin_editor_api = { path = "../../crates/plugin_editor_api" }

# Built-in plugins
blueprint_editor_plugin = { git = "https://github.com/Far-Beyond-Pulsar/Plugin_Blueprints", rev = "d603bc8f2d570a0bc148c060fa3802c58acf6fa8" }
serde = { version = "1.0", features = ["derive"] }
schemars = "1.0"
tracing.workspace = true
smol = "2"
futures = "0.3"
rust-i18n.workspace = true
serde_json = "1.0"
