[package]
name = "ui_level_editor"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# UI framework
gpui-ce.workspace = true
ui.workspace = true

# UI crates
ui_common.workspace = true
ui_types_common.workspace = true
window_manager.workspace = true
plugin_editor_api.workspace = true

# Engine
engine_state.workspace = true
engine_backend.workspace = true
profiling.workspace = true

# Helio renderer and asset loading
helio-asset-compat = { git = "https://github.com/Far-Beyond-Pulsar/Helio", rev = "6320b6cec9419097c4500c86574499492a0a94d0" }
glam.workspace = true

# Standard dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
tracing.workspace = true
chrono = { version = "0.4", features = ["serde"] }
schemars = "1.0"
device_query = "4.0.1"
raw-window-handle = "0.6"
rust-i18n.workspace = true
wgpu.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
core-graphics2 = "0.5"
objc2 = "0.6"
objc2-app-kit = "0.3"
objc2-foundation = "0.3"  # separate crate for Foundation types

[target.'cfg(windows)'.dependencies]
winapi = { version = "0.3", features = ["winuser", "shellapi"] }