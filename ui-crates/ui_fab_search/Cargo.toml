[package]
name = "ui_fab_search"
version = "0.1.0"
edition = "2024"

[dependencies]
gpui-ce.workspace = true
window_manager = { workspace = true }
ui = { workspace = true }
ui_common = { workspace = true }
urlencoding = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
reqwest = { version = "0.13", default-features = false, features = ["blocking", "brotli", "charset", "form", "gzip", "http2", "json", "rustls-no-provider", "system-proxy"] }
tokio = { workspace = true, features = ["rt"] }
smol = { workspace = true }
image = { workspace = true }
smallvec = { workspace = true }
dirs = { workspace = true }
tracing = { workspace = true }

[lints]
workspace = true
