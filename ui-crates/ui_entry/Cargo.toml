[package]
name = "ui_entry"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# Rust installer - drives platform-native rustup installation as a library
rustup.workspace = true

# UI framework
gpui-ce.workspace = true
ui.workspace = true
ui_common.workspace = true
# Engine
engine_state.workspace = true
engine_fs.workspace = true

# Git manager window dependency
ui_git_manager.workspace = true

# Loading screen is used by entry for splash/progress
ui_loading_screen.workspace = true


# Git operations
git2 = "0.19"

# File system
directories = "5"
rfd = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"
open = "5.0"
reqwest = { version = "0.12", features = ["json", "blocking"] }
tokio = { version = "1", features = ["rt"] }
smol = "2"
tracing.workspace = true

# Audio
rodio = { version = "0.19", default-features = false, features = ["mp3"] }

[target.'cfg(windows)'.dependencies]
runas = "1.2"
