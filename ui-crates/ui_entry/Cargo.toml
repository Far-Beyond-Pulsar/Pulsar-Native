[package]
name = "ui_entry"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# Rust installer - drives platform-native rustup installation as a library
rustup.workspace = true

# UI framework
gpui-ce.workspace = true
ui.workspace = true
ui_common.workspace = true
# Engine
engine_state.workspace = true
engine_fs.workspace = true

# Git manager window dependency
ui_git_manager.workspace = true

# Loading screen is used by entry for splash/progress
ui_loading_screen.workspace = true


# Git operations
git2 = { workspace = true }

# File system
directories = { workspace = true }
rfd = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
toml = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
parking_lot = { workspace = true }
open = { workspace = true }
reqwest = { workspace = true, features = ["json", "blocking"] }
tokio = { workspace = true, features = ["rt"] }
smol = { workspace = true }
tracing.workspace = true

# Audio
rodio = { version = "0.22.2", default-features = false, features = ["mp3", "playback"] }

[target.'cfg(windows)'.dependencies]
runas = "1.2"
