[package]
name = "ui_file_manager"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
# UI framework
gpui-ce.workspace = true
ui.workspace = true
window_manager.workspace = true

# UI crates
ui_common.workspace = true
ui_types_common.workspace = true

# Engine
engine_fs.workspace = true
engine_state.workspace = true
tracing.workspace = true

# Plugin system
plugin_editor_api = { path = "../../crates/plugin_editor_api" }
plugin_ai_tools = { path = "../../crates/plugin_ai_tools" }
plugin_ai_macro = { path = "../../crates/plugin_ai_macro" }

# Utilities
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
schemars = "1.0"
chrono = { version = "0.4", features = ["serde"] }
rust-i18n.workspace = true
