info:
  version: 3.0.0
  description: >
    The Sketchfab REST API provide access to read and write Sketchfab data.
    Users are authentified with their Sketchfab API Token or OAuth2 credentials.
    Responses are formatted in JSON. Inputs are in JSON unless specified
    otherwise.


    ## How to make authenticated requests


    Some endpoints require users to be authenticated. Users can log in with
    OAuth2 (preferred), or an API Token.

    When an endpoint requires authentication, you need to send an extra HTTP
    header:


    * for OAuth2: `Authorization: Bearer {INSERT_OAUTH_ACCESS_TOKEN_HERE}`

    * for API Token: `Authorization: Token {INSERT_API_TOKEN_HERE}`


    Some model endpoints referring to password-protected models require a
    password encoded in base64 in request header: `x-skfb-model-pwd:
    {base64(THE_PASSWORD)}`


    See the [Sketchfab Login (OAuth2)
    documentation](https://sketchfab.com/developers/oauth) for more information
    on authentication.


    ## Pagination


    When a request gives many results, results are paginated using cursors.

    Each response will contain these fields you can use to make subsequent
    requests:


    * next: full URL containing the next results.

    * previous: full URL containing the previous results.

    * cursors: an object containing the previous and next cursor that you can
    use to build the URL to the previous/next results.


    By default, pages contain 24 items. You can use the `count` parameter to
    change the number of items per page. This parameter is capped to 24: it will
    be ignored if a higher value is passed; the default value will be applied
    instead.


    ## Date format


    Dates are formatted using the ISO 8601 format.


    ## Limits and quotas


    Calls to the API can be throttled to limit abuse. When your application is
    being throttled, it will

    receive a `429 Too Many Requests` response. This means that you must wait
    before making more requests.
  title: Sketchfab API
paths:
  /v3/orgs/{orgUid}:
    get:
      security:
        - Token: []
      description: Returns the detail of an organization. Can take either the
        organization UID (orgUid) or name preceded by a @ (@orgName).
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/OrgDetailResponse"
      tags:
        - orgs
      produces:
        - application/json
    parameters:
      - required: true
        type: string
        description: The organization UID
        in: path
        name: orgUid
    patch:
      description: Returns the detail of an organization. Can take either the
        organization UID (orgUid) or name preceded by a @ (@orgName).
      parameters:
        - description: Updates the organizations biography
          in: formData
          maxLength: 256
          required: false
          type: string
          name: biography
        - description: Updates the organizations city
          in: formData
          maxLength: 50
          required: false
          type: string
          name: city
        - description: Updates the organnizations country
          in: formData
          maxLength: 50
          required: false
          type: string
          name: country
        - description: Updates the organnizations display name
          in: formData
          maxLength: 50
          required: false
          type: string
          name: displayName
        - description: Updates the organnizations twitter username
          in: formData
          maxLength: 15
          required: false
          type: string
          name: twitterUsername
        - description: Updates the organnizations facebook username
          in: formData
          maxLength: 50
          required: false
          type: string
          name: facebookUsername
        - description: Updates the organnizations linkedin username
          in: formData
          maxLength: 50
          required: false
          type: string
          name: linkedinUsername
        - description: Updates the organnizations tagline
          in: formData
          maxLength: 140
          required: false
          type: string
          name: tagline
        - description: Updates the organnizations website
          in: formData
          maxLength: 128
          required: false
          type: string
          name: website
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - orgs
      consumes:
        - multipart/form-data
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/OrgDetailResponse"
        "400":
          description: Bad Request
        "401":
          description: Authentication credentials were not provided or do not match
        "403":
          description: Permission Denied
        "404":
          description: Not Found
  /v3/me/subscriptions/{uid}:
    parameters:
      - required: true
        type: string
        description: The collection UID
        in: path
        name: uid
    delete:
      security:
        - Token: []
      description: Unsubscribes to a collection.
      responses:
        "204":
          description: No Content
        "401":
          description: Authentication credentials were not provided or do not match
        "404":
          description: Not Found
      tags:
        - me
        - collections
      produces:
        - application/json
  /v3/models/{uid}/transfer-to-org:
    post:
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/OrgModelDetailResponse"
        "400":
          description: Bad Request. Model cannot be transfered to the org.
        "401":
          description: Unauthorized. User token is not valid or missing.
        "403":
          description: Permission Denied
        "404":
          description: Not Found. Model does not exist.
        "429":
          description: Too many requests. You must wait before making requests again.
      parameters:
        - required: true
          type: string
          description: The organization UID
          in: formData
          name: org
        - required: true
          type: string
          description: The project UID
          in: formData
          name: project
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - models
        - orgs
      description: Move a model from an individual account to an organization
    parameters:
      - required: true
        type: string
        description: The model UID
        in: path
        name: uid
  /v3/orgs/{orgUid}/matcaps/{matcapUid}:
    delete:
      security:
        - Token: []
      description: Deletes a matcap in the given organization. Can take either the
        organization UID (orgUid) or name preceded by a @ (@orgName).
      responses:
        "204":
          description: No Content
        "401":
          description: Authentication credentials were not provided or do not match
        "403":
          description: Permission Denied
        "404":
          description: Not Found
      tags:
        - orgs
        - matcaps
      produces:
        - application/json
    parameters:
      - required: true
        type: string
        description: The organization UID
        in: path
        name: orgUid
      - required: true
        type: string
        description: The matcap UID
        in: path
        name: matcapUid
    get:
      security:
        - Token: []
      description: Retrieve a matcap in the given organization. Can take either the
        organization UID (orgUid) or name preceded by a @ (@orgName).
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/OrgMatcapDetail"
        "401":
          description: Authentication credentials were not provided or do not match
        "403":
          description: Permission Denied
        "404":
          description: Not Found
      tags:
        - orgs
        - matcaps
      produces:
        - application/json
  /v3/users:
    get:
      description: Returns a list of users.
      tags:
        - users
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/UserResponse"
      parameters:
        - required: false
          type: string
          name: sort_by
          enum:
            - dateJoined
            - -dateJoined
            - followerCount
            - -followerCount
            - modelCount
            - -modelCount
          in: query
        - required: false
          type: string
          name: account
          enum:
            - free
            - pro
            - biz
          in: query
      produces:
        - application/json
  /v3/comments:
    post:
      responses:
        "201":
          headers:
            Location:
              type: string
          description: Created
          schema:
            $ref: "#/definitions/CreateResponse"
        "400":
          description: Bad Request
        "429":
          description: Too many requests
      parameters:
        - required: true
          type: string
          description: <a href="#/models" target="_blank">Model</a> (uid) to comment
          in: formData
          name: model
        - description: Sets a body
          in: formData
          maxLength: 3000
          required: true
          type: string
          name: body
      tags:
        - comments
      security:
        - Token: []
      consumes:
        - multipart/form-data
      description: Creates a comment
    get:
      tags:
        - comments
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/CommentResponse"
      parameters:
        - required: false
          description: Sorts results
          in: query
          enum:
            - createdAt
            - -createdAt
          type: string
          name: sort_by
        - required: false
          type: string
          description: Retrieves comments of a model (urlid)
          in: query
          name: model
        - required: false
          type: string
          description: Retrieves comments of a <a href="#!/users/"
            target="_blank">user</a> (username)
          in: query
          name: user
      description: Returns a list of comments from public, published models
  /v3/collections:
    post:
      description: Creates a collection.
      parameters:
        - description: Sets a name
          in: formData
          maxLength: 50
          required: true
          type: string
          name: name
        - description: Sets a description
          in: formData
          maxLength: 1024
          required: true
          type: string
          name: description
        - description: Sets <a href="#/models" target="_blank">models</a> (uid)
          items:
            type: string
          required: false
          name: models
          in: formData
          maxLength: 1024
          type: array
          collectionFormat: multi
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - collections
      consumes:
        - multipart/form-data
      responses:
        "201":
          headers:
            Location:
              type: string
          description: Created
          schema:
            $ref: "#/definitions/CreateResponse"
        "400":
          description: Bad Request
        "401":
          description: Authentication credentials were not provided or do not match
    get:
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/CollectionResponse"
      parameters:
        - required: false
          type: string
          description: Retrieves collections created by <a href="#!/users/"
            target="_blank">user</a> (username)
          in: query
          name: user
        - description: Retrieves collections by uid
          in: query
          items:
            type: string
          required: false
          type: array
          name: uids
        - in: query
          description: Retrieves collections created since a date (ISO 8601 format)
          format: date
          required: false
          type: string
          name: created_since
        - required: false
          type: boolean
          description: Retrieves restricted collections (off by default)
          in: query
          name: restricted
        - required: false
          type: string
          name: sort_by
          enum:
            - createdAt
            - -createdAt
            - subscriberCount
            - -subscriberCount
          in: query
      produces:
        - application/json
      tags:
        - collections
      consumes:
        - multipart/form-data
      description: Returns a list of collections
  /v3/me:
    get:
      security:
        - Token: []
      description: Returns your profile
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/MeDetail"
      tags:
        - me
        - users
      produces:
        - application/json
    patch:
      description: Updates your profile.
      parameters:
        - required: false
          type: string
          description: Updates your password. Needs passwordConfirmation
          in: formData
          name: password
        - required: false
          type: string
          name: passwordConfirmation
          in: formData
        - description: Updates your <a href="#/skills" target="_blank">skills</a> (uid)
          name: skills
          in: formData
          items:
            type: string
          required: false
          type: array
          collectionFormat: multi
        - description: Updates your display name
          in: formData
          maxLength: 50
          required: false
          type: string
          name: displayName
        - description: Updates your twitter username
          in: formData
          maxLength: 15
          required: false
          type: string
          name: twitterUsername
        - description: Updates your facebook username
          in: formData
          maxLength: 50
          required: false
          type: string
          name: facebookUsername
        - description: Updates your linkedin username
          in: formData
          maxLength: 50
          required: false
          type: string
          name: linkedinUsername
        - description: Updates your bio
          in: formData
          maxLength: 256
          required: false
          type: string
          name: biography
        - description: Updates your tagline
          in: formData
          maxLength: 140
          required: false
          type: string
          name: tagline
        - description: Updates your website
          in: formData
          maxLength: 128
          required: false
          type: string
          name: website
        - description: Updates your city
          in: formData
          maxLength: 50
          required: false
          type: string
          name: city
        - description: Updates your country
          in: formData
          maxLength: 50
          required: false
          type: string
          name: country
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - me
        - users
      consumes:
        - multipart/form-data
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Authentication credentials were not provided or do not match
  /v3/orgs/{orgUid}/backgrounds:
    post:
      description: Creates a new background in the given organization. Can take either
        the organization UID (orgUid) or name preceded by a @ (@orgName).
      parameters:
        - required: true
          type: file
          description: JPG or PNG image. Max 4mb
          in: formData
          name: image
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - orgs
        - backgrounds
      consumes:
        - multipart/form-data
      responses:
        "201":
          headers:
            Location:
              type: string
          description: Created
          schema:
            $ref: "#/definitions/CreateResponse"
        "400":
          description: Bad Request
        "401":
          description: Authentication credentials were not provided or do not match
        "403":
          description: Permission Denied
    parameters:
      - required: true
        type: string
        description: The organization UID
        in: path
        name: orgUid
    get:
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/OrgBackgroundListResponse"
      parameters:
        - required: false
          type: string
          name: sort_by
          enum:
            - createdAt
            - -createdAt
          in: query
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - orgs
        - backgrounds
      description: Returns a list of backgrounds from the given organization. Can take
        either the organization UID (orgUid) or name preceded by a @ (@orgName).
  /v3/models/{uid}:
    put:
      description: Reuploads a model. Accepts multipart/form-data only.
      parameters:
        - description: Sets a name
          in: formData
          maxLength: 48
          required: false
          type: string
          name: name
        - required: false
          type: boolean
          description: Sets private (requires a pro plan or higher)
          in: formData
          name: private
        - description: Enables 2D view in model inspector. All <a
            href="https://help.sketchfab.com/hc/en-us/articles/115004862686-Inspector">downloadable
            models must have isInspectable enabled</a>.
          in: formData
          default: false
          required: false
          type: boolean
          name: isInspectable
        - description: Whether the model has restricted content.
          in: formData
          default: false
          required: false
          type: boolean
          name: isAgeRestricted
        - description: Sets a password (requires a pro plan or higher)
          in: formData
          maxLength: 64
          required: false
          type: string
          name: password
        - in: formData
          description: |
            Sets a <a href=#!/licenses/ target='_blank'>license</a> (label). This makes the model downloadable to others. All <a href="https://help.sketchfab.com/hc/en-us/articles/115004862686-Inspector">downloadable models must have isInspectable enabled</a>.
          format: test
          required: false
          type: string
          name: license
        - description: Sets <a href=#!/tags/ target='_blank'>tags</a> (slug)
          name: tags
          in: formData
          items:
            type: string
          required: false
          type: array
          collectionFormat: multi
        - description: Sets <a href=#!/categories/ target='_blank'>categories</a> (slug)
          name: categories
          in: formData
          items:
            type: string
          required: false
          type: array
          collectionFormat: multi
        - description: Enables AR for a model (requires a premium plan or higher)
          in: formData
          default: false
          required: false
          type: boolean
          name: isArEnabled
        - description: Sets published after it is processed
          in: formData
          default: true
          required: false
          type: boolean
          name: isPublished
        - description: Sets a description
          in: formData
          maxLength: 1024
          required: false
          type: string
          name: description
        - required: true
          type: file
          description: Model archive. Max 50mb for basic users, 200mb for pro users, 500mb
            for biz users
          in: formData
          name: modelFile
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - models
      consumes:
        - multipart/form-data
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Authentication credentials were not provided or do not match
        "403":
          description: Permission Denied
        "404":
          description: Not Found
    get:
      description: Returns the detail of a model
      tags:
        - models
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/ModelDetail"
        "403":
          description: Permission Denied
        "404":
          description: Not Found
      parameters:
        - required: false
          type: string
          description: Password when the model is password-protected
          in: header
          name: x-skfb-model-pwd
      produces:
        - application/json
    patch:
      description: Updates model information.
      parameters:
        - description: Sets a name
          in: formData
          maxLength: 48
          required: false
          type: string
          name: name
        - required: false
          type: boolean
          description: Sets private (requires a pro plan or higher)
          in: formData
          name: private
        - description: Enables 2D view in model inspector. All <a
            href="https://help.sketchfab.com/hc/en-us/articles/115004862686-Inspector">downloadable
            models must have isInspectable enabled</a>.
          in: formData
          default: false
          required: false
          type: boolean
          name: isInspectable
        - description: Whether the model has restricted content.
          in: formData
          default: false
          required: false
          type: boolean
          name: isAgeRestricted
        - description: Sets a password (requires a pro plan or higher)
          in: formData
          maxLength: 64
          required: false
          type: string
          name: password
        - in: formData
          description: |
            Sets a <a href=#!/licenses/ target='_blank'>license</a> (slug). This makes the model downloadable to others. All <a href="https://help.sketchfab.com/hc/en-us/articles/115004862686-Inspector">downloadable models must have isInspectable enabled</a>.
          format: test
          required: false
          type: string
          name: license
        - description: Sets <a href=#!/tags/ target='_blank'>tags</a> (slug)
          name: tags
          in: formData
          items:
            type: string
          required: false
          type: array
          collectionFormat: multi
        - description: Sets <a href=#!/categories/ target='_blank'>categories</a> (slug)
          name: categories
          in: formData
          items:
            type: string
          required: false
          type: array
          collectionFormat: multi
        - description: Enables AR for a model (requires a premium plan or higher)
          in: formData
          default: false
          required: false
          type: boolean
          name: isArEnabled
        - description: Sets published after it is processed
          in: formData
          default: true
          required: false
          type: boolean
          name: isPublished
        - description: Disables public comments for the model
          in: formData
          default: false
          required: false
          type: boolean
          name: hasCommentsDisabled
        - description: Sets a description
          in: formData
          maxLength: 1024
          required: false
          type: string
          name: description
        - required: false
          type: integer
          description: Sets a price. Your model must have either standard or editorial
            license.
          in: formData
          name: price
        - required: false
          type: string
          description: Sets <a href=#!/models/patch_v3_models_uid_options
            target='_blank'>options</a>
          in: formData
          name: options
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - models
      consumes:
        - multipart/form-data
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "401":
          description: Authentication credentials were not provided or do not match
        "403":
          description: Permission Denied
        "404":
          description: Not Found
    parameters:
      - required: true
        type: string
        description: The model UID
        in: path
        name: uid
    delete:
      security:
        - Token: []
      tags:
        - models
      responses:
        "204":
          description: No Content
      description: Deletes one of your models
  /v3/me/environments:
    post:
      description: Creates an environment (pro only). Accepts multipart/form-data only.
      parameters:
        - description: Sets a name
          in: formData
          maxLength: 64
          required: true
          type: string
          name: name
        - required: true
          type: file
          name: environmentFile
          in: formData
      produces:
        - aplication/json
      security:
        - Token: []
      tags:
        - me
        - environments
      consumes:
        - multipart/form-data
      responses:
        "201":
          headers:
            Location:
              type: string
          description: Created
          schema:
            $ref: "#/definitions/CreateResponse"
        "401":
          description: Authentication credentials were not provided or do not match
        "403":
          description: Permission Denied
    get:
      security:
        - Token: []
      description: Returns available environments for your models.
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/EnvironmentResponse"
        "401":
          description: Authentication credentials were not provided or do not match
      tags:
        - me
        - environments
      produces:
        - application/json
  /v3/users/{uid}:
    parameters:
      - required: true
        type: string
        description: The user UID
        in: path
        name: uid
    get:
      description: Returns the detail of a user.
      tags:
        - users
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/UserDetail"
        "404":
          description: Not Found
      produces:
        - application/json
  /v3/me/backgrounds:
    post:
      description: Creates a new background (requires a pro plan or higher). Accepts
        multipart/form-data only.
      parameters:
        - required: true
          type: file
          description: JPG or PNG image. Max 4mb
          in: formData
          name: image
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - me
        - backgrounds
      consumes:
        - multipart/form-data
      responses:
        "201":
          headers:
            Location:
              type: string
          description: Created
          schema:
            $ref: "#/definitions/CreateResponse"
        "400":
          description: Bad Request
        "401":
          description: Authentication credentials were not provided or do not match
        "403":
          description: Permission Denied
    get:
      responses:
        "200":
          description: Success
          schema:
            $ref: "#/definitions/BackgroundResponse"
      parameters:
        - required: false
          type: string
          name: sort_by
          enum:
            - createdAt
            - -createdAt
          in: query
      produces:
        - application/json
      security:
        - Token: []
      tags:
        - me
        - backgrounds
      description: Returns available backgrounds for your models
  /v3/models/{uid}/options:
    parameters:
      - required: true
        type: string
        description: The model UID
        in: path
        name: uid
    patch:
      responses:
        "204":
          description: No-Content
        "400":
          description: Bad Request
        "401":
          description: Authentication credentials were not provided or do not match
        "403":
          description: Permission Denied
      parameters:
        - required: false
          description: Defines the shading type
          in: formData
          enum:
            - lit
            - shadeless
          type: string
          name: shading
        - required: false
          type: string
          description: >
            Defines the background used. Either a color, a <a
            href="#/backgrounds" target="_blank">background</a> (uid), an <a
            href="#/environment" target="_blank">environment</a> (uid) or
            transparent.

