apiVersion: v1
kind: Secret
metadata:
  name: pulsar-relay-secrets
  namespace: pulsar-relay
type: Opaque
stringData:
  # 🔑 REQUIRED: Generate a strong random secret:
  #   PowerShell: [Convert]::ToBase64String((1..32|%{Get-Random -Max 256}))
  #   Linux/macOS: openssl rand -base64 32
  jwt-secret: "change-this-secret-in-production"

  # 🔑 OPTIONAL: Persistent Ed25519 key (hex-encoded, 64 chars = 32 bytes).
  # Keeps session tokens valid across restarts.
  # Generate: openssl rand -hex 32
  # If omitted, an ephemeral key is generated each pod restart.
  # Uncomment the env block in deployment.yaml when using this.
  server-ed25519-key: ""
