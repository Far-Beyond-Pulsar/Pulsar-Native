apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsar-relay
  namespace: pulsar-relay
  labels:
    app: pulsar-relay
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pulsar-relay
  template:
    metadata:
      labels:
        app: pulsar-relay
    spec:
      # Run as non-root user (matches Dockerfile's uid:gid)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: pulsar-relay
          image: ghcr.io/your-org/pulsar-relay:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: quic
              containerPort: 8443
              protocol: UDP
            - name: udp-hole
              containerPort: 7000
              protocol: UDP
          envFrom:
            - configMapRef:
                name: pulsar-relay-config
          env:
            - name: PULSAR_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pulsar-relay-secrets
                  key: jwt-secret
            - name: PULSAR_SERVER_ED25519_KEY
              valueFrom:
                secretKeyRef:
                  name: pulsar-relay-secrets
                  key: server-ed25519-key
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
# Headless Service for internal discovery (required by QUIC)
apiVersion: v1
kind: Service
metadata:
  name: pulsar-relay-headless
  namespace: pulsar-relay
spec:
  clusterIP: None
  selector:
    app: pulsar-relay
  ports:
    - name: http
      port: 8080
