apiVersion: v1
kind: Service
metadata:
  name: pulsar-relay
  namespace: pulsar-relay
  labels:
    app: pulsar-relay
  annotations:
    # 👇 Rancher-specific annotations for Service LB / monitoring
    field.cattle.io/targetWorkloadIds: '["deployment:pulsar-relay:pulsar-relay"]'
spec:
  type: LoadBalancer
  selector:
    app: pulsar-relay
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: quic
      port: 8443
      targetPort: 8443
      protocol: UDP
    - name: udp-hole
      port: 7000
      targetPort: 7000
      protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pulsar-relay-network-policy
  namespace: pulsar-relay
spec:
  podSelector:
    matchLabels:
      app: pulsar-relay
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
        - port: 8443
          protocol: UDP
        - port: 7000
          protocol: UDP
  egress:
    - {}
