name: Release

# ============================================================================
# RELEASE CONFIGURATION - Modify these to customize the release
# ============================================================================
env:
  # Crates to build on each platform (newline-separated list)
  # Examples: "crates/engine", "crates/plugin_manager", etc.
  # First crate is used for version checking
  CRATES_TO_BUILD: |
    crates/core/engine
    crates/core/pulsar-relay

  # Crates to build examples for (newline-separated list)
  CRATES_WITH_EXAMPLES: ""

  # Enable/disable crate building (set to 'false' to skip crate builds)
  BUILD_CRATES: "true"

  # Generate example binaries for each platform (set to 'true' to enable, requires CRATES_WITH_EXAMPLES)
  BUILD_EXAMPLES: "false"

  # Send a Discord notification when a release is published (set to 'false' to disable)
  DISCORD_NOTIFY: "true"

  # Discord embed color for release announcements (integer; 0x57F287 = green)
  DISCORD_EMBED_COLOR: "5762695"

  # Username shown on the Discord webhook message
  DISCORD_USERNAME: "Pulsar Bot"

  # Avatar URL for the Discord webhook bot (leave empty to use the webhook's default avatar)
  DISCORD_AVATAR_URL: "https://raw.githubusercontent.com/Far-Beyond-Pulsar/Pulsar-Native/refs/heads/main/assets/images/logo_sqrkl.png"

  # Footer icon URL for the Discord embed (leave empty to omit)
  DISCORD_FOOTER_ICON_URL: "https://raw.githubusercontent.com/Far-Beyond-Pulsar/Pulsar-Native/refs/heads/main/assets/images/logo_sqrkl.png"

  # Thumbnail URL shown in the top-right of the Discord embed (leave empty to omit)
  DISCORD_THUMBNAIL_URL: "https://raw.githubusercontent.com/Far-Beyond-Pulsar/Pulsar-Native/refs/heads/main/assets/images/logo_sqrkl.png"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      allow_dangerous_release:
        description: Skip fmt, clippy, tests, lockfile, and audit checks for this release run
        required: false
        default: false
        type: boolean

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      allow_dangerous_release: ${{ steps.override.outputs.allow_dangerous_release }}
      version: ${{ steps.check.outputs.version }}
      package_name: ${{ steps.get-name.outputs.package_name }}
      first_crate: ${{ steps.get-crate.outputs.first_crate }}
      previous_version: ${{ steps.check.outputs.previous_version }}
      current_version: ${{ steps.check.outputs.current_version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 2
          submodules: recursive

      - name: Detect dangerous release override
        id: override
        shell: bash
        env:
          UI_OVERRIDE: ${{ github.event.inputs.allow_dangerous_release || 'false' }}
        run: |
          COMMIT_MESSAGE=$(git show -s --format=%B "$GITHUB_SHA")
          FORCE_COMMIT=false

          if printf '%s' "$COMMIT_MESSAGE" | grep -q '\[FORCE-RELEASE\]'; then
            FORCE_COMMIT=true
          fi

          if [ "$UI_OVERRIDE" = "true" ] || [ "$FORCE_COMMIT" = "true" ]; then
            echo "allow_dangerous_release=true" >> $GITHUB_OUTPUT
            echo "Dangerous release override enabled"
          else
            echo "allow_dangerous_release=false" >> $GITHUB_OUTPUT
            echo "Dangerous release override disabled"
          fi

      - name: Get first crate path
        id: get-crate
        run: |
          FIRST_CRATE=$(echo "${{ env.CRATES_TO_BUILD }}" | head -n1 | xargs)
          echo "first_crate=$FIRST_CRATE" >> $GITHUB_OUTPUT

      - name: Display crate path for debugging
        run: |
          echo "First crate: ${{ steps.get-crate.outputs.first_crate }}"
          echo "Cargo.toml content:"
          head -5 "${{ steps.get-crate.outputs.first_crate }}/Cargo.toml"

      - name: Get package name from Cargo.toml
        id: get-name
        run: |
          CRATE_PATH="${{ steps.get-crate.outputs.first_crate }}"
          PACKAGE_NAME=$(grep -m1 '^name' "$CRATE_PATH/Cargo.toml" | sed 's/name[[:space:]]*=[[:space:]]*"\(.*\)"/\1/')
          PACKAGE_NAME=$(echo "$PACKAGE_NAME" | tr -d '[:space:]')
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "Package name: [$PACKAGE_NAME]"

      - name: Check if Cargo.toml version changed
        id: check
        shell: bash
        env:
          ALLOW_DANGEROUS_RELEASE: ${{ steps.override.outputs.allow_dangerous_release }}
        run: |
          CRATE_PATH="${{ steps.get-crate.outputs.first_crate }}"
          CURRENT_VERSION=$(grep -m1 version "$CRATE_PATH/Cargo.toml" | cut -d '"' -f2)
          PREVIOUS_VERSION=$(git show "HEAD^1:$CRATE_PATH/Cargo.toml" | grep -m1 version | cut -d '"' -f2)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "previous_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed: $PREVIOUS_VERSION -> $CURRENT_VERSION"
          elif [ "$ALLOW_DANGEROUS_RELEASE" = "true" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Dangerous release override forcing release for version: $CURRENT_VERSION"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT_VERSION"
          fi

  lint-and-test:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.allow_dangerous_release != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Lint/test stage marker
        run: echo "Starting lint and test fan-out"

  fmt-check:
    needs: [check-version, lint-and-test]
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.allow_dangerous_release != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install Rust with rustfmt
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    needs: [check-version, lint-and-test]
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.allow_dangerous_release != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install Rust with clippy
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: clippy

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxkbcommon-x11-0 libxkbcommon-x11-dev libasound2-dev

      - name: Run clippy
        run: |
          cargo clippy --workspace --exclude pulsar_docs --all-targets -- \
            -A warnings \
            -A dead_code \
            -A clippy::too_many_arguments \
            -A clippy::type_complexity \
            -A clippy::match_like_matches_macro \
            -A clippy::only_used_in_recursion \
            -A improper_ctypes_definitions \
            -A clippy::field_reassign_with_default \
            -A clippy::result_large_err \
            -A clippy::doc_overindented_list_items

  unit-tests:
    needs: [check-version, lint-and-test]
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.allow_dangerous_release != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxkbcommon-x11-0 libxkbcommon-x11-dev libasound2-dev

      - name: Install nextest
        run: cargo nextest --version || cargo install cargo-nextest --locked

      - name: Run unit tests
        run: cargo nextest run --workspace --locked

  check-lockfile:
    needs: [check-version, lint-and-test]
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.allow_dangerous_release != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Validate Cargo.lock is up to date
        run: |
          if ! cargo metadata --locked --format-version 1 > /dev/null; then
            echo "Cargo.lock is out of date with one or more Cargo.toml manifests."
            echo "Update lockfile locally (for example: cargo update -w), then commit Cargo.lock."
            exit 1
          fi
          git diff --exit-code -- Cargo.lock || (echo "Cargo.lock changed unexpectedly. Commit Cargo.lock updates before releasing." && exit 1)

  cargo-audit:
    needs: [check-version, lint-and-test]
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.allow_dangerous_release != 'true'
    runs-on: ubuntu-latest
    outputs:
      audit_section: ${{ steps.audit.outputs.audit_section }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Run cargo audit and prepare release-note section
        id: audit
        shell: bash
        run: |
          set +e
          cargo install cargo-audit --locked >/tmp/cargo-audit-install.log 2>&1
          INSTALL_STATUS=$?
          AUDIT_OUTPUT=""
          AUDIT_STATUS=0

          if [ $INSTALL_STATUS -eq 0 ]; then
            AUDIT_OUTPUT=$(cargo audit 2>&1)
            AUDIT_STATUS=$?
          else
            AUDIT_OUTPUT="cargo-audit install failed.\n\n$(cat /tmp/cargo-audit-install.log)"
            AUDIT_STATUS=99
          fi

          {
            echo "audit_section<<EOF"
            echo ""
            echo "<details>"
            echo "<summary>Security Audit (cargo audit) - non-blocking</summary>"
            echo ""
            echo '```text'
            echo "cargo audit exit status: $AUDIT_STATUS"
            echo ""
            echo "$AUDIT_OUTPUT"
            echo '```'
            echo ""
            echo "</details>"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          exit 0

  validation-gate:
    needs:
      [
        check-version,
        fmt-check,
        clippy,
        unit-tests,
        check-lockfile,
        cargo-audit,
      ]
    if: always() && needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_allowed: ${{ steps.gate.outputs.release_allowed }}
    steps:
      - name: Evaluate release gate
        id: gate
        shell: bash
        run: |
          if [ "${{ needs.check-version.outputs.allow_dangerous_release }}" = "true" ]; then
            echo "release_allowed=true" >> "$GITHUB_OUTPUT"
            echo "Dangerous release enabled: skipping validation gate"
            exit 0
          fi

          if [ "${{ needs.fmt-check.result }}" = "success" ] && \
             [ "${{ needs.clippy.result }}" = "success" ] && \
             [ "${{ needs.unit-tests.result }}" = "success" ] && \
             [ "${{ needs.check-lockfile.result }}" = "success" ] && \
             [ "${{ needs.cargo-audit.result }}" = "success" ]; then
            echo "release_allowed=true" >> "$GITHUB_OUTPUT"
            echo "All release validations passed"
          else
            echo "release_allowed=false" >> "$GITHUB_OUTPUT"
            echo "Release validation failed"
            exit 1
          fi

  get-changelog:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      prev_tag: ${{ steps.get_prev_tag.outputs.prev_tag }}
      commits: ${{ steps.get_commits.outputs.commits }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get previous version tag
        id: get_prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "v${{ needs.check-version.outputs.version }}" | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            echo "prev_tag=" >> $GITHUB_OUTPUT
          else
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Get commits since last release
        id: get_commits
        run: |
          if [ -z "${{ steps.get_prev_tag.outputs.prev_tag }}" ]; then
            export GIT_RANGE=
          else
            export GIT_RANGE="${{ steps.get_prev_tag.outputs.prev_tag }}..HEAD"
          fi
          COMMITS=$(python - <<'PY'
          import json
          import os
          import subprocess

          range_spec = os.environ.get("GIT_RANGE")
          cmd = ["git", "log"]
          if range_spec:
            cmd.append(range_spec)
          cmd.append("--format=%H%x00%s%x00%an%x00")

          output = subprocess.check_output(cmd)
          parts = output.decode("utf-8", errors="replace").split("\x00")
          if parts and parts[-1] == "":
            parts = parts[:-1]

          commits = []
          for i in range(0, len(parts), 3):
            if i + 2 >= len(parts):
              break
            commits.append({
              "sha": parts[i],
              "message": parts[i + 1],
              "author": parts[i + 2],
            })

          print(json.dumps(commits))
          PY
          )
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  generate-notes:
    needs: [check-version, get-changelog]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      models: read
    outputs:
      notes: ${{ steps.generate_notes.outputs.notes }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install requests

      - name: Generate release notes with GitHub Models
        id: generate_notes
        run: |
          NOTES=$(python .github/scripts/generate_release_notes.py \
            --github-token "${{ secrets.CI_COPILOT_TOKEN }}" \
            --repo-token "${{ secrets.GITHUB_TOKEN }}" \
            --repo-owner "${{ github.repository_owner }}" \
            --repo-name "${{ github.event.repository.name }}" \
            --version "${{ needs.check-version.outputs.version }}" \
            --prev-tag "${{ needs.get-changelog.outputs.prev_tag }}")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  create-release:
    needs: [check-version, get-changelog, generate-notes, cargo-audit]
    # Run even if generate-notes failed — we fall back to plain git log
    if: always() && needs.check-version.outputs.should_release == 'true' && needs.get-changelog.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Generate fallback release notes
        if: needs.generate-notes.result != 'success'
        id: fallback_notes
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## What's Changed" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          PREV_TAG="${{ needs.get-changelog.outputs.prev_tag }}"
          if [ -z "$PREV_TAG" ]; then
            git log --format='* %s (%h)' >> $GITHUB_OUTPUT
          else
            git log "$PREV_TAG..HEAD" --format='* %s (%h)' >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Compose release body
        id: compose_body
        shell: bash
        env:
          NOTES_AI: ${{ needs.generate-notes.outputs.notes }}
          NOTES_FALLBACK: ${{ steps.fallback_notes.outputs.notes }}
          AUDIT_SECTION: ${{ needs.cargo-audit.outputs.audit_section }}
        run: |
          BODY_FILE="release-body.md"
          if [ "${{ needs.generate-notes.result }}" = "success" ]; then
            printf '%s\n' "$NOTES_AI" > "$BODY_FILE"
          else
            printf '%s\n' "$NOTES_FALLBACK" > "$BODY_FILE"
          fi

          printf '\n%s\n' "$AUDIT_SECTION" >> "$BODY_FILE"
          echo "body_path=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Release v${{ needs.check-version.outputs.version }}
          body_path: ${{ steps.compose_body.outputs.body_path }}
          draft: true
          prerelease: false

  build-release:
    needs: [check-version, create-release, validation-gate]
    if: always() && needs.check-version.outputs.should_release == 'true' && needs.create-release.result == 'success' && needs.validation-gate.outputs.release_allowed == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_path: target/x86_64-unknown-linux-gnu/release
            asset_name: -linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_path: target/x86_64-pc-windows-msvc/release
            asset_name: -windows-x86_64.exe
            extension: .exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            bin_path: target/i686-pc-windows-msvc/release
            asset_name: -windows-i686.exe
            extension: .exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            bin_path: target/aarch64-pc-windows-msvc/release
            asset_name: -windows-arm64.exe
            extension: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_path: target/aarch64-apple-darwin/release
            asset_name: -macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          profile: minimal
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install openssl@3 protobuf
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "PATH=$(brew --prefix protobuf)/bin:$PATH" >> $GITHUB_ENV
          brew link --force protobuf
          protoc --version

      - name: Install cargo-bundle
        if: runner.os == 'macOS'
        run: |
          cargo install cargo-bundle --force

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libxkbcommon-x11-0 libxkbcommon-x11-dev libasound2-dev

      - name: Build native
        if: ${{ env.BUILD_CRATES == 'true' }}
        shell: bash
        run: |
          ARGS="--release --target ${{ matrix.target }}"
          while IFS= read -r crate_path; do
            crate_path=$(echo "$crate_path" | xargs)
            if [ -n "$crate_path" ]; then
              crate_name=$(grep -m1 '^name' "$crate_path/Cargo.toml" | sed 's/name[[:space:]]*=[[:space:]]*"\(.*\)"/\1/' | tr -d '[:space:]')
              ARGS="$ARGS -p $crate_name"
              echo "Added crate: $crate_name from $crate_path"
            fi
          done <<< "${{ env.CRATES_TO_BUILD }}"

          echo "Building with args: $ARGS"
          cargo build $ARGS
        env:
          RUST_BACKTRACE: 1

      - name: Stage binaries for upload
        if: ${{ env.BUILD_CRATES == 'true' }}
        shell: bash
        run: |
          mkdir -p release-artifacts
          while IFS= read -r crate_path; do
            crate_path=$(echo "$crate_path" | xargs)
            if [ -n "$crate_path" ]; then
              crate_name=$(grep -m1 '^name' "$crate_path/Cargo.toml" | sed 's/name[[:space:]]*=[[:space:]]*"\(.*\)"/\1/' | tr -d '[:space:]')
              BIN_PATH="${{ matrix.bin_path }}/${crate_name}${{ matrix.extension || '' }}"
              ASSET_NAME="${crate_name}${{ matrix.asset_name }}"
              echo "Staging $BIN_PATH as $ASSET_NAME"
              cp "$BIN_PATH" "release-artifacts/${ASSET_NAME}"
            fi
          done <<< "${{ env.CRATES_TO_BUILD }}"

      - name: Upload native artifacts
        if: ${{ env.BUILD_CRATES == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-native-${{ matrix.target }}
          path: release-artifacts/
          if-no-files-found: warn

      - name: Create macOS ARM .app bundle
        if: runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin' && env.BUILD_CRATES == 'true'
        shell: bash
        run: |
          PACKAGE_NAME="${{ needs.check-version.outputs.package_name }}"
          cargo bundle --release --target aarch64-apple-darwin -p pulsar_engine
          APP_DIR=$(find target/aarch64-apple-darwin/release/bundle -maxdepth 2 -name '*.app' | head -n 1)
          if [ -z "$APP_DIR" ]; then
            echo "❌ ERROR: .app bundle not found"
            find target/aarch64-apple-darwin/release/bundle -maxdepth 3 -type d | sort
            exit 1
          fi
          ZIP_NAME="${PACKAGE_NAME}-macos-arm64.app.zip"
          ditto -c -k --keepParent "$APP_DIR" "$ZIP_NAME"
          echo "APP_ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV
          echo "Created .app archive: $ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Upload macOS .app artifact
        if: runner.os == 'macOS' && matrix.target == 'aarch64-apple-darwin' && env.BUILD_CRATES == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-macos-app
          path: ${{ env.APP_ZIP_PATH }}
          if-no-files-found: warn

      - name: Build examples
        if: ${{ env.BUILD_EXAMPLES == 'true' }}
        shell: bash
        run: |
          ARGS="--release --target ${{ matrix.target }}"
          while IFS= read -r crate_path; do
            crate_path=$(echo "$crate_path" | xargs)
            if [ -n "$crate_path" ]; then
              crate_name=$(grep -m1 '^name' "$crate_path/Cargo.toml" | sed 's/name[[:space:]]*=[[:space:]]*"\(.*\)"/\1/' | tr -d '[:space:]')
              ARGS="$ARGS -p $crate_name"
              echo "Added crate for examples: $crate_name from $crate_path"
            fi
          done <<< "${{ env.CRATES_WITH_EXAMPLES }}"

          echo "Building examples with args: $ARGS"
          cargo build $ARGS
        env:
          RUST_BACKTRACE: 1

      - name: Create examples archive
        if: ${{ env.BUILD_EXAMPLES == 'true' }}
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          ARCHIVE_NAME="examples${{ matrix.asset_name }}.tar.gz"

          if [ -d "$BIN_DIR" ]; then
            echo "Found release directory: $BIN_DIR"
            echo "Looking for example binaries..."

            # Find example binaries (handle both with and without .exe extension)
            BINARIES=()
            for pattern in "render_v2_basic" "render_v2_sky"; do
              if [ -f "$BIN_DIR/$pattern.exe" ]; then
                BINARIES+=("$pattern.exe")
              elif [ -f "$BIN_DIR/$pattern" ]; then
                BINARIES+=("$pattern")
              fi
            done

            if [ ${#BINARIES[@]} -eq 0 ]; then
              echo "⚠️ No example binaries found!"
              echo "Available files in $BIN_DIR:"
              ls -lh "$BIN_DIR" | grep -E "render_v2"
              exit 1
            fi

            echo "Found binaries: ${BINARIES[@]}"
            cd "$BIN_DIR"
            tar -czf "../../../$ARCHIVE_NAME" "${BINARIES[@]}"
            cd - > /dev/null

            if [ -f "$ARCHIVE_NAME" ] && [ -s "$ARCHIVE_NAME" ]; then
              echo "✅ Created archive: $ARCHIVE_NAME"
              ls -lh "$ARCHIVE_NAME"
              echo "EXAMPLES_ARCHIVE=$ARCHIVE_NAME" >> $GITHUB_ENV
            else
              echo "⚠️ Archive creation failed or is empty"
              exit 1
            fi
          else
            echo "⚠️ No release directory found at: $BIN_DIR"
            exit 1
          fi

      - name: Upload examples artifact
        if: ${{ env.BUILD_EXAMPLES == 'true' && env.EXAMPLES_ARCHIVE != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-examples-${{ matrix.target }}
          path: ${{ env.EXAMPLES_ARCHIVE }}
          if-no-files-found: warn

  cross-builds:
    needs: [check-version, create-release, validation-gate]
    if: always() && needs.check-version.outputs.should_release == 'true' && needs.create-release.result == 'success' && needs.validation-gate.outputs.release_allowed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            asset_suffix: -linux-arm64
            openssl_arch: arm64
          - target: i686-unknown-linux-gnu
            asset_suffix: -linux-i686
            openssl_arch: i386
          - target: armv7-unknown-linux-gnueabihf
            asset_suffix: -linux-armv7
            openssl_arch: armhf

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1
        with:
          profile: minimal
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Install cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Set variables
        run: |
          echo "Cross-build targets configured"
          mkdir -p release-artifacts

      - name: Configure cross for OpenSSL
        if: ${{ !matrix.no_openssl }}
        run: |
          cat > Cross.toml << EOF
          [target.${{ matrix.target }}]
          pre-build = [
              "dpkg --add-architecture ${{ matrix.openssl_arch }}",
              "apt-get update",
              "apt-get install -y libssl-dev:${{ matrix.openssl_arch }} libglib2.0-dev:${{ matrix.openssl_arch }} libxkbcommon-x11-0:${{ matrix.openssl_arch }} libxkbcommon-x11-dev:${{ matrix.openssl_arch }} || true"
          ]
          EOF
          cat Cross.toml

      - name: Build WebAssembly
        if: ${{ matrix.target == 'wasm32-unknown-unknown' && env.BUILD_CRATES == 'true' }}
        run: |
          rustup target add wasm32-unknown-unknown
          ARGS="--release --target wasm32-unknown-unknown"
          while IFS= read -r crate_path; do
            crate_path=$(echo "$crate_path" | xargs)
            if [ -n "$crate_path" ]; then
              crate_name=$(grep -m1 '^name' "$crate_path/Cargo.toml" | sed 's/name[[:space:]]*=[[:space:]]*"\(.*\)"/\1/' | tr -d '[:space:]')
              ARGS="$ARGS -p $crate_name"
              echo "Added crate: $crate_name from $crate_path"
            fi
          done <<< "${{ env.CRATES_TO_BUILD }}"
          cargo build $ARGS

      - name: Build with cross
        if: ${{ matrix.target != 'wasm32-unknown-unknown' && env.BUILD_CRATES == 'true' }}
        run: |
          ARGS="--release --target ${{ matrix.target }}"
          while IFS= read -r crate_path; do
            crate_path=$(echo "$crate_path" | xargs)
            if [ -n "$crate_path" ]; then
              if [ -f "$crate_path/Cargo.toml" ]; then
                crate_name=$(grep -m1 '^name' "$crate_path/Cargo.toml" | sed 's/name[[:space:]]*=[[:space:]]*"\(.*\)"/\1/' | tr -d '[:space:]')
                ARGS="$ARGS -p $crate_name"
                echo "Added crate: $crate_name from $crate_path"
              else
                echo "Skipping invalid crate path: $crate_path (Cargo.toml not found)"
              fi
            fi
          done <<< "${{ env.CRATES_TO_BUILD }}"
          cross build $ARGS

      - name: Generate SHA256 and stage artifacts
        if: ${{ env.BUILD_CRATES == 'true' }}
        shell: bash
        run: |
          while IFS= read -r crate_path; do
            crate_path=$(echo "$crate_path" | xargs)
            if [ -n "$crate_path" ]; then
              crate_name=$(grep -m1 '^name' "$crate_path/Cargo.toml" | sed 's/name[[:space:]]*=[[:space:]]*"\(.*\)"/\1/' | tr -d '[:space:]')
              BIN_PATH="target/${{ matrix.target }}/release/${crate_name}${{ matrix.extension || '' }}"
              ASSET_NAME="${crate_name}${{ matrix.asset_suffix }}"
              echo "Staging $BIN_PATH as $ASSET_NAME"
              ls -l "$BIN_PATH" || (echo "❌ ERROR: Binary not found at $BIN_PATH" && exit 1)
              echo "Generating SHA256 for $BIN_PATH"
              sha256sum "$BIN_PATH" > "release-artifacts/$ASSET_NAME.sha256"
              cp "$BIN_PATH" "release-artifacts/$ASSET_NAME"
            fi
          done <<< "${{ env.CRATES_TO_BUILD }}"
          echo "Staged artifacts:"
          ls -la release-artifacts/

      - name: Upload cross-build artifacts
        if: ${{ env.BUILD_CRATES == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-cross-${{ matrix.target }}
          path: release-artifacts/
          if-no-files-found: warn

      - name: Build examples
        if: ${{ env.BUILD_EXAMPLES == 'true' }}
        run: |
          ARGS="--release --target ${{ matrix.target }}"
          while IFS= read -r crate_path; do
            crate_path=$(echo "$crate_path" | xargs)
            if [ -n "$crate_path" ]; then
              crate_name=$(grep -m1 '^name' "$crate_path/Cargo.toml" | sed 's/name[[:space:]]*=[[:space:]]*"\(.*\)"/\1/' | tr -d '[:space:]')
              ARGS="$ARGS -p $crate_name"
              echo "Added crate for examples: $crate_name from $crate_path"
            fi
          done <<< "${{ env.CRATES_WITH_EXAMPLES }}"
          cross build $ARGS

      - name: Create examples archive
        if: ${{ env.BUILD_EXAMPLES == 'true' }}
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          ARCHIVE_NAME="examples${{ matrix.asset_suffix }}.tar.gz"

          if [ -d "$BIN_DIR" ]; then
            echo "Found release directory: $BIN_DIR"
            echo "Looking for example binaries..."

            # Find example binaries (handle both with and without .exe extension)
            BINARIES=()
            for pattern in "render_v2_basic" "render_v2_sky"; do
              if [ -f "$BIN_DIR/$pattern.exe" ]; then
                BINARIES+=("$pattern.exe")
              elif [ -f "$BIN_DIR/$pattern" ]; then
                BINARIES+=("$pattern")
              fi
            done

            if [ ${#BINARIES[@]} -eq 0 ]; then
              echo "⚠️ No example binaries found!"
              echo "Available files in $BIN_DIR:"
              ls -lh "$BIN_DIR" | grep -E "render_v2"
              exit 1
            fi

            echo "Found binaries: ${BINARIES[@]}"
            cd "$BIN_DIR"
            tar -czf "../../../$ARCHIVE_NAME" "${BINARIES[@]}"
            cd - > /dev/null

            if [ -f "$ARCHIVE_NAME" ] && [ -s "$ARCHIVE_NAME" ]; then
              echo "✅ Created archive: $ARCHIVE_NAME"
              ls -lh "$ARCHIVE_NAME"
              echo "EXAMPLES_ARCHIVE=$ARCHIVE_NAME" >> $GITHUB_ENV
            else
              echo "⚠️ Archive creation failed or is empty"
              exit 1
            fi
          else
            echo "⚠️ No release directory found at: $BIN_DIR"
            exit 1
          fi

      - name: Upload examples artifact
        if: ${{ env.BUILD_EXAMPLES == 'true' && env.EXAMPLES_ARCHIVE != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-examples-cross-${{ matrix.target }}
          path: ${{ env.EXAMPLES_ARCHIVE }}
          if-no-files-found: warn

  upload-release:
    needs: [check-version, create-release, build-release, cross-builds]
    # Run even if some build jobs failed — only upload what actually succeeded
    if: always() && needs.check-version.outputs.should_release == 'true' && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-*
          path: all-artifacts
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.4.1"

      - name: List artifacts to upload
        run: |
          echo "Artifacts staged for upload:"
          find all-artifacts -type f | sort

      - name: Sign all artifacts
        shell: bash
        run: |
          shopt -s nullglob
          files=(all-artifacts/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts found to sign."
            exit 0
          fi
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "Signing: $file"
              cosign sign-blob --yes "$file" --output-signature "$file.sig"
            fi
          done

      - name: Upload all artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(all-artifacts/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts found to upload."
            exit 0
          fi
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload "v${{ needs.check-version.outputs.version }}" \
                "$file" \
                --repo "${{ github.repository }}" \
                --clobber || echo "⚠️ Upload failed for $file (continuing)"
            fi
          done

  docker-release:
    # Only depend on check-version so images build even on forced re-releases
    # where create-release might fail (tag already exists).
    needs: [check-version]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pulsar-relay
            context: .
            dockerfile: crates/core/pulsar-relay/Dockerfile
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive

      - name: Compute lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v4 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ matrix.name }}:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ matrix.name }}:v${{ needs.check-version.outputs.version }}
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.version=${{ needs.check-version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.check-version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  finalize-release:
    needs: [check-version, upload-release, docker-release]
    # Always run so the release is published even if some builds partially failed
    if: always() && needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Prepend container image links and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          TAG="v${VERSION}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')

          # Fetch the current draft body
          CURRENT_BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)

          # Build the container images section to prepend
          cat > container-section.md << SECTION
          ## Container Images

          Pull the sidecar images for this release from the GitHub Container Registry:

          \`\`\`bash
          docker pull ghcr.io/${OWNER_LC}/pulsar-relay:${TAG}

          \`\`\`

          | Image | Package page | Tags |
          |---|---|---|
          | \`pulsar-relay\` | [ghcr.io/${OWNER_LC}/pulsar-relay](https://github.com/${OWNER_LC}/Pulsar-Native/pkgs/container/pulsar-relay) | \`${TAG}\`, \`latest\` |
          ---

          SECTION

          # Dedent the heredoc content
          sed -i 's/^          //' container-section.md

          # Combine: container section first, then original release notes
          printf '%s\n%s' "$(cat container-section.md)" "$CURRENT_BODY" > release-notes-final.md

          echo "Final release notes preview (first 30 lines):"
          head -30 release-notes-final.md

          # Update the release body and publish (undraft)
          gh release edit "$TAG" \
            --repo "$REPO" \
            --notes-file release-notes-final.md \
            --draft=false

      - name: Notify Discord
        if: env.DISCORD_NOTIFY == 'true'
        uses: tsickert/discord-webhook@b217a69502f52803de774ded2b1ab7c282e99645 # v7.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: ${{ env.DISCORD_USERNAME }}
          embed-title: "Pulsar Native v${{ needs.check-version.outputs.version }} Released"
          embed-url: "${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.check-version.outputs.version }}"
          embed-description: |
            A new release of **Pulsar Native** is now available.
            [View release notes](${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.check-version.outputs.version }})
          embed-color: ${{ env.DISCORD_EMBED_COLOR }}
          embed-footer-text: "${{ github.repository }} • ${{ github.sha }}"
          embed-footer-icon-url: ${{ env.DISCORD_FOOTER_ICON_URL }}
          embed-thumbnail-url: ${{ env.DISCORD_THUMBNAIL_URL }}
          avatar-url: ${{ env.DISCORD_AVATAR_URL }}
